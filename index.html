<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT | Ultra-Connect AI Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Noto+Sans+Devanagari:wght@400;700;900&display=swap');
        :root { --saffron: #ff9933; }
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif; background: #080a0f; height: 100vh; display: flex; flex-direction: column; color: white; margin: 0; }
        .chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .user-msg { background: var(--saffron); color: black; font-weight: 800; align-self: flex-end; border-radius: 20px 20px 0 20px; padding: 12px 18px; max-width: 80%; box-shadow: 0 4px 15px rgba(255,153,51,0.2); }
        .ai-msg { background: rgba(255, 255, 255, 0.05); color: white; align-self: flex-start; border-radius: 20px 20px 20px 0; padding: 12px 18px; max-width: 80%; border: 1px solid rgba(255, 255, 255, 0.1); line-height: 1.6; }
    </style>
</head>
<body>

    <header class="p-5 border-b border-white/10 bg-black/60 flex items-center justify-between backdrop-blur-lg">
        <div class="flex items-center gap-4">
            <img src="https://i.ibb.co/C30Ybjck/PT-20250224-170650-0000.png" class="w-12 h-12 rounded-2xl border-2 border-[#ff9933]">
            <div>
                <h1 class="text-lg font-black uppercase text-[#ff9933] leading-none">Patel Traders</h1>
                <p class="text-[9px] font-black text-emerald-400 uppercase tracking-[3px] mt-1.5">Connected to Gemini Flash ●</p>
            </div>
        </div>
    </header>

    <main id="chatDisplay" class="chat-box"></main>

    <footer class="p-4 bg-black/80 border-t border-white/10">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="userInput" placeholder="यहाँ प्रश्न पूछें..." 
                class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-[#ff9933] font-bold text-white">
            <button onclick="askAI()" class="bg-[#ff9933] text-black px-8 rounded-2xl font-black uppercase text-xs hover:bg-[#e65c00] transition active:scale-95">
                भेजें (Send)
            </button>
        </div>
    </footer>

<script>
    // ✅ आपकी स्क्रीनशॉट से मिली API Key (Suffix: NMto)
    const PT_API_KEY = "AIzaSyCOzmXroquzR0edbNhKkJP31n-biILNMto"; 
    const PT_ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${PT_API_KEY}`;

    const SYSTEM_RULES = `
    आप 'पटेल ट्रेडर्स' के आधिकारिक AI असिस्टेंट हैं। संचालक: संजय कुमार। स्थान: कन्नौज।
    नियम: 
    1. केवल शुद्ध हिंदी (Sanskritized) बोलें। 'प्रतिष्ठान', 'मूल्य', 'सुदृढ़' जैसे शब्दों का प्रयोग करें।
    2. बेड/पलंग नहीं बनते। वारंटी और होम डिलीवरी की सुविधा नहीं है।
    3. उधार के लिए 'कस्टमर वॉल्ट' देखें। बहुत विनम्र रहें।
    `;

    const chatDisplay = document.getElementById('chatDisplay');
    const userInput = document.getElementById('userInput');

    window.onload = () => addMsg("प्रणाम! मैं पटेल ट्रेडर्स का AI असिस्टेंट हूँ। मैं आपकी सहायता के लिए तैयार हूँ।", 'ai-msg');

    userInput.addEventListener("keypress", (e) => { if(e.key === 'Enter') askAI(); });

    async function askAI() {
        const text = userInput.value.trim();
        if(!text) return;

        addMsg(text, 'user-msg');
        userInput.value = "";
        const tempAi = addMsg("विचार कर रहा हूँ...", 'ai-msg');

        try {
            const response = await fetch(PT_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `${SYSTEM_RULES} \n\n सवाल: ${text}` }] }]
                })
            });

            const data = await response.json();
            
            if(data.candidates && data.candidates[0].content) {
                tempAi.innerText = data.candidates[0].content.parts[0].text;
            } else {
                tempAi.innerText = "माफ़ी चाहूँगा, एआई सर्वर से संपर्क नहीं हो पाया। अपनी Google AI Studio सेटिंग्स चेक करें।";
            }
        } catch (e) {
            tempAi.innerText = "नेटवर्क एरर! कृपया इंटरनेट चेक करें।";
        }
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = type;
        div.innerText = text;
        chatDisplay.appendChild(div);
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
        return div;
    }
</script>
</body>
</html>
