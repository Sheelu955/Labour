        body {

            height: 100dvh;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-container { 
            height: calc(100dvh - 240px); 
            scroll-behavior: smooth; 
        }

            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .message-bubble { 
            max-width: 85%; 
            animation: slideUp 0.3s ease-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: relative;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        
        footer {
            font-size: 10px;
            color: #9ca3af;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 0;
            margin-top: auto;
        }
        .admin-mode-active { border: 2px solid #2563eb !important; }

        /* Mic Pulsing Effect */
        .mic-active { 
            animation: pulse-red 1.5s infinite; 
            background: #ef4444 !important; 
            color: white !important;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 🧠 Advanced Thinking Indicator */
        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #f97316;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: .5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #f97316;
            animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before {
            left: -10px;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 10px;
            animation-delay: 1s;
        }

        @keyframes dot-flashing {
            0% { background-color: #f97316; box-shadow: 0 0 4px #f97316; }
            50%, 100% { background-color: #ffedd5; box-shadow: none; }
        }

        .thinking-pulse {
            animation: softPulse 1.5s infinite;
        }
        @keyframes softPulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        /* 💡 Suggestion Pills CSS */
        .suggestion-pill {
            display: inline-block;
            background: #f3f4f6;
            color: #2563eb;
            border: 1px solid #d1d5db;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 6px;
            margin-right: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-pill:hover {
            background: #e0e7ff;
            border-color: #93c5fd;
        }

        /* 🔍 AUTOCOMPLETE DROPDOWN LIST */
        .autocomplete-dropdown {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            background: #ffffff;

            border-bottom: 1px solid #f3f4f6;

        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover {
            background-color: #fff7ed;
            color: #f97316;
            padding-left: 25px;

    </style>
</head>

    // 🎙️ Speech Recognition Setup (AUTO-SEND PRESERVED)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN'; 
        recognition.interimResults = true; 
        recognition.continuous = false; 

        recognition.onstart = () => {
            isRecording = true;
            document.getElementById('voiceBtn').classList.add('mic-active');
            document.getElementById('userInput').placeholder = "गॉमनी सुन रहा है... बोलिए";
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                }
            }
            if (finalTranscript !== '') {
                document.getElementById('userInput').value = finalTranscript;
                toggleSendBtn();
                
                // 🔄 VOICE AUTO-SEND
                setTimeout(() => {
                    if(document.getElementById('userInput').value.trim() !== "") {
                        document.getElementById("autocompleteList").style.display = "none";
                        sendMessage();
                    }
                }, 800); 
            }
        };

        recognition.onerror = () => resetMic();
        recognition.onend = () => resetMic();
    }

    function startVoiceInput() {
        if (!recognition) {
            alert("आपका ब्राउज़र वॉइस सपोर्ट नहीं करता। कृपया क्रोम का इस्तेमाल करें।");
            return;
        }
        if (isRecording) {
            recognition.stop();
        } else {
            try {
                window.speechSynthesis.cancel();
                recognition.start();
            } catch (e) {
                resetMic();
            }
        }
    }

    function resetMic() {
        isRecording = false;
        document.getElementById('voiceBtn').classList.remove('mic-active');
        document.getElementById('userInput').placeholder = "अपना सवाल यहाँ टाइप करें या बोलें...";
    }

    function speakText(text) {
        if (!isVoiceEnabled || !('speechSynthesis' in window)) return;
        
        window.speechSynthesis.cancel();
        let cleanText = text.replace(/(https?:\/\/[^\s]+)/g, "लिंक");
        cleanText = cleanText.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '')
                              .replace(/[*_#|]/g, '');

        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'hi-IN'; 
        utterance.rate = 1.0; 
        window.speechSynthesis.speak(utterance);
    }

    function toggleVoiceState() {
        isVoiceEnabled = !isVoiceEnabled;
        if (!isVoiceEnabled) window.speechSynthesis.cancel(); 

        const buttons = document.querySelectorAll('.voice-toggle-btn');
        buttons.forEach(btn => {
            if (isVoiceEnabled) {
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
                btn.classList.remove('text-red-500');
                btn.classList.add('text-green-500');
            } else {
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>`;
                btn.classList.remove('text-green-500');
                btn.classList.add('text-red-500');
            }
        });
    }

    function stopAudio() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
    }

                addMsg(wMsg, 'ai');

    function logout() {
        if(confirm("क्या आप इस सेशन से बाहर जाना चाहते हैं?")) {
            localStorage.removeItem('gomini_uName');

            location.reload();

    function activateAdminUI() {

    function toggleSendBtn() {
        const val = document.getElementById('userInput').value.trim();
        const btn = document.getElementById('sendBtn');
        btn.style.display = val.length > 0 ? 'flex' : 'none';
    }

    // 🔍 DROPDOWN AUTOCOMPLETE LOGIC 
    function handleTypingDropdown() {
        toggleSendBtn();
        const val = document.getElementById('userInput').value.trim().toLowerCase();
        const dropdown = document.getElementById('autocompleteList');
        dropdown.innerHTML = '';
        
        if(val.length < 2) {
            dropdown.style.display = 'none';
            return;
        }
        
        let matches = [];
        for(let item of LOCAL_KNOWLEDGE) {
            for(let kw of item.keywords) {
                if(kw.length > 3 && kw.includes(val)) {
                    if(!matches.includes(kw)) matches.push(kw);
                }
            }
        }
        
        if(matches.length > 0) {
            matches.slice(0, 6).forEach(match => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.innerText = match;
                div.onclick = () => {
                    document.getElementById('userInput').value = match;
                    dropdown.style.display = 'none';
                    sendMessage();
                };
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        } else {
            dropdown.style.display = 'none';
        }
    }

    async function startPortal() {
        const name = document.getElementById('uName').value.trim();
        const phone = document.getElementById('uPhone').value.trim();
        if(name.length < 2 || phone.length < 10) return alert("नाम और नंबर सही डालें!");
        
        userInfo = { name, phone };

        localStorage.setItem('gomini_uPhone', phone);

    // Exact Phrase Match
    function checkLocalKnowledge(text) {
        const cleanText = " " + text.toLowerCase().replace(/[.,!?]/g, '') + " "; 
        for (let item of LOCAL_KNOWLEDGE) {
            for (let keyword of item.keywords) {
                if (cleanText.includes(" " + keyword + " ")) {
                    return item.response;
                }
            }
        }
        return null; 
    }

    // 💡 Did you mean Suggestion Pills
    function findSimilarQuestions(text) {
        const words = text.toLowerCase().replace(/[.,!?]/g, '').split(' ').filter(w => w.length > 3);
        let suggestions = [];
        for (let item of LOCAL_KNOWLEDGE) {
            for (let keyword of item.keywords) {
                for(let word of words) {
                    if (keyword.includes(word) || word.includes(keyword)) {
                        if(!suggestions.includes(keyword)) suggestions.push(keyword);
                    }
                }
            }
        }
        return suggestions.slice(0, 3);
    }

    window.sendSuggestion = function(text) {
        document.getElementById('userInput').value = text;
        document.getElementById("autocompleteList").style.display = "none";
        sendMessage();
    };

    function optimizeQueryForDatabase(rawText) {
        let cleanText = rawText.toLowerCase().replace(/[?.,!]/g, '');
        const fillers = ["please tell me about", "can you tell me", "mujhe batao ki", "i want to know", "give me the link to", "do you have", "what kind of", "what type of", "kaun kaun se", "give me", "show me", "bhaiya", "please", "kya", "mujhe", "batao", "link to", "what is", "where is", "how to", "i need", "chahiye", "dikhao", "ke bare mein", "detail", "details"];
        for(let filler of fillers) {
            cleanText = cleanText.replace(new RegExp(filler, 'gi'), '');
        }
        cleanText = cleanText.trim();
        return cleanText.length > 0 ? cleanText : rawText;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const originalText = input.value.trim();
        if(!originalText) return;

        window.speechSynthesis.cancel(); 
        document.getElementById("autocompleteList").style.display = "none"; 

        addMsg(originalText, 'user');
        input.value = "";
        toggleSendBtn();
        showThinking(true, "Gomini AI सोच रहा है...");

        let isAdmin = sessionStorage.getItem('gomini_admin') === 'true';

        // SECRET ADMIN TRIGGER (No UI Buttons!)
        if(originalText.toLowerCase().includes("admin955") || originalText.toLowerCase().includes("redmi 955")) {
            activateAdminUI();
            showThinking(false);
            let ans = "संजय भाई, एडमिन मोड सक्रिय है। अब आप 'सवाल | जवाब' लिखकर मुझे सिखा सकते हैं।";
            addMsg("✅ " + ans, 'ai');
            speakText(ans);
            return;
        }

        if(isAdmin && originalText.includes("|")) {
            let parts = originalText.split("|");
            try {
                let learnUrl = `${CONFIG.url}?token=${CONFIG.token}&action=learn&q=${encodeURIComponent(parts[0].trim())}&a=${encodeURIComponent(parts[1].trim())}&key=${CONFIG.master_key}`;
                await fetch(learnUrl, {mode: 'no-cors'});
                showThinking(false);
                let ans = "संजय भाई, यह जानकारी मेरी मेमोरी में सेव हो गई है।";
                addMsg("✅ " + ans, 'ai');
                speakText(ans);
            } catch(e) {
                showThinking(false);
                addMsg("Error: सेव नहीं हो पाया।", 'ai');
            }
            return;
        }

        // 1️⃣ Mega Database Check
        let localResponse = checkLocalKnowledge(originalText);
        if (localResponse) {
            setTimeout(() => {
                showThinking(false);
                addMsg(localResponse, 'ai');
                speakText(localResponse);
            }, 800); 
            return;
        }

        // 2️⃣ External Google Sheet Check
        showThinking(true, "Connecting to Database...");
        let smartQuery = optimizeQueryForDatabase(originalText);

        try {
            let res = await fetch(`${CONFIG.url}?token=${CONFIG.token}&action=askJarvis&q=${encodeURIComponent(smartQuery)}&phone=${userInfo.phone}`);
            let data = await res.json();
            
            showThinking(false);
            
            // 3️⃣ IF NOT FOUND IN LOCAL OR DB
            if(!data.answer || data.answer.trim() === "" || data.answer.includes("नहीं पता") || data.answer.includes("not in my database")) {
                
                let suggestions = findSimilarQuestions(originalText);
                
                if(suggestions.length > 0) {
                    let suggestionHTML = `मुझे इसका सटीक जवाब नहीं मिला। क्या आपका मतलब इनमें से किसी से था?<br><div class="mt-2">`;
                    suggestions.forEach(s => {
                        suggestionHTML += `<span class="suggestion-pill" onclick="sendSuggestion('${s}')">${s}</span>`;
                    });
                    suggestionHTML += `</div>`;
                    addMsg(suggestionHTML, 'ai');
                    speakText("मुझे इसका सटीक जवाब नहीं मिला। स्क्रीन पर दिए गए विकल्पों में से चुनें।");
                } else {
                    // EXACT PHRASE RESTORED
                    let notFoundMsg = "That's it not in my memory.";
                    addMsg(notFoundMsg, 'ai');
                    speakText("दैट इज नॉट इन माय मेमोरी।");
                }

            } else {
                addMsg(data.answer, 'ai');
                speakText(data.answer); 
            }

        } catch(e) {
            showThinking(false);
            let err = "माफ़ कीजिये, सर्वर अभी कनेक्ट नहीं हो पा रहा है।";
            addMsg(err, 'ai');
            speakText(err);
        }
    }

    function addMsg(text, sender, save = true) {
        const body = document.getElementById('chatBody');
        const div = document.createElement('div');
        
        if(sender === 'ai') {
            div.className = "message-bubble bg-white p-4 rounded-[28px] rounded-tl-none border border-gray-100 text-gray-800 text-sm font-bold shadow-sm";
            
            const iconSvg = isVoiceEnabled ? 
                `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>` : 
                `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>`;
            const colorClass = isVoiceEnabled ? "text-green-500" : "text-red-500";

            let formattedText = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                return `<a href="${url}" target="_blank" class="text-blue-600 underline hover:text-blue-800 break-all">${url}</a>`;
            });

            div.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[10px] text-orange-500 block">PT GOMINI</span>
                    <button onclick="toggleVoiceState()" title="आवाज़ चालू/बंद करें" class="voice-toggle-btn ${colorClass} bg-gray-50 rounded-full w-6 h-6 flex items-center justify-center transition-all">${iconSvg}</button>
                </div>
                ${formattedText}
            `;
        } else {
            div.className = "message-bubble bg-orange-500 p-5 rounded-[28px] rounded-tr-none text-white text-sm font-bold ml-auto shadow-lg";
            div.innerText = text; 
        }
        
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;

        if(save) {
            const chatHistory = JSON.parse(localStorage.getItem('gomini_chat_history')) || [];
            chatHistory.push({ text: text, sender: sender });
            if(chatHistory.length > 50) chatHistory.shift(); 
            localStorage.setItem('gomini_chat_history', JSON.stringify(chatHistory));
        }
    }

    function showThinking(show, text = "Gomini AI सोच रहा है...") {
        const ind = document.getElementById('thinkingIndicator');
        const tText = document.getElementById('thinkingText');
        const body = document.getElementById('chatBody');
        if(show) {
            tText.innerText = text;
            ind.classList.remove('hidden');
            body.scrollTop = body.scrollHeight;
        } else {
            ind.classList.add('hidden');
        }
    }
