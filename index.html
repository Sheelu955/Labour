        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%); 
            height: 100dvh; 
            overflow: hidden; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .chat-container { 
            height: calc(100dvh - 240px); 
            scroll-behavior: smooth; 
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .message-bubble { 
            max-width: 85%; 
            animation: slideUp 0.3s ease-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: relative;
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }

            padding: 10px 0;
            margin-top: auto;
        }

        /* Mic Pulsing Effect */
        .mic-active { 
            animation: pulse-red 1.5s infinite; 
            background: #ef4444 !important; 
            color: white !important;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* 🧠 Advanced Thinking Indicator */
        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #f97316;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: .5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #f97316;
            animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before {
            left: -10px;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 10px;
            animation-delay: 1s;
        }

        @keyframes dot-flashing {
            0% { background-color: #f97316; box-shadow: 0 0 4px #f97316; }
            50%, 100% { background-color: #ffedd5; box-shadow: none; }
        }

        .thinking-pulse {
            animation: softPulse 1.5s infinite;
        }

            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'hi-IN'; 
        recognition.interimResults = true; 
        recognition.continuous = false; 

        recognition.onstart = () => {
            isRecording = true;
            document.getElementById('voiceBtn').classList.add('mic-active');
            document.getElementById('userInput').placeholder = "गॉमनी सुन रहा है... बोलिए";
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript;
                }
            }
            if (finalTranscript !== '') {
                document.getElementById('userInput').value = finalTranscript;
                toggleSendBtn();
            }
        };

        recognition.onerror = () => resetMic();
        recognition.onend = () => resetMic();
    }

    function startVoiceInput() {
        if (!recognition) {
            alert("आपका ब्राउज़र वॉइस सपोर्ट नहीं करता। कृपया क्रोम का इस्तेमाल करें।");
            return;
        }
        if (isRecording) {
            recognition.stop();
        } else {
            try {
                window.speechSynthesis.cancel();
                recognition.start();
            } catch (e) {
                resetMic();
            }
        }
    }

    function resetMic() {
        isRecording = false;
        document.getElementById('voiceBtn').classList.remove('mic-active');
        document.getElementById('userInput').placeholder = "अपना सवाल यहाँ टाइप करें या बोलें...";
    }

    function speakText(text) {
        if (!isVoiceEnabled || !('speechSynthesis' in window)) return;
        
        window.speechSynthesis.cancel();
        let cleanText = text.replace(/(https?:\/\/[^\s]+)/g, "लिंक");
        cleanText = cleanText.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, '')
                              .replace(/[*_#|]/g, '');

        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'hi-IN'; 
        utterance.rate = 1.0; 
        window.speechSynthesis.speak(utterance);
    }

    function toggleVoiceState() {
        isVoiceEnabled = !isVoiceEnabled;
        
        if (!isVoiceEnabled) {
            window.speechSynthesis.cancel(); 
        }

        const buttons = document.querySelectorAll('.voice-toggle-btn');
        buttons.forEach(btn => {
            if (isVoiceEnabled) {
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
                btn.classList.remove('text-red-500');
                btn.classList.add('text-green-500');
            } else {
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>`;
                btn.classList.remove('text-green-500');
                btn.classList.add('text-red-500');
            }
        });
    }

    function stopAudio() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
        }
    }

    window.onload = function() {
        const savedName = localStorage.getItem('gomini_uName');
        const savedPhone = localStorage.getItem('gomini_uPhone');
        if (savedName && savedPhone) {
            userInfo = { name: savedName, phone: savedPhone };
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('displayUserName').innerText = savedName;
            if(sessionStorage.getItem('gomini_admin') === 'true') activateAdminUI();
            
            let wMsg = `नमस्ते ${savedName} जी! PT GOMINI MAU में आपकी वापसी देखकर खुशी हुई।`;
            addMsg(wMsg, 'ai');
            speakText(`नमस्ते ${savedName} जी! पटेल ट्रेडर्स में आपका स्वागत है।`);
        }
    };

    function logout() {
        if(confirm("क्या आप इस सेशन से बाहर जाना चाहते हैं?")) {
            localStorage.removeItem('gomini_uName');
            localStorage.removeItem('gomini_uPhone');
            sessionStorage.removeItem('gomini_admin');
            location.reload(); 
        }
    }

    function activateAdminUI() {
        sessionStorage.setItem('gomini_admin', 'true');
        document.getElementById('adminBadge').classList.remove('hidden');
        document.getElementById('inputBoxContainer').classList.add('admin-mode-active');
        document.getElementById('userInput').placeholder = "सिखाएँ: सवाल | जवाब";
    }

    function toggleSendBtn() {
        const val = document.getElementById('userInput').value.trim();
        const btn = document.getElementById('sendBtn');
        btn.style.display = val.length > 0 ? 'flex' : 'none';
    }

    async function startPortal() {
        const name = document.getElementById('uName').value.trim();
        const phone = document.getElementById('uPhone').value.trim();
        if(name.length < 2 || phone.length < 10) return alert("नाम और नंबर सही डालें!");
        userInfo = { name, phone };
        localStorage.setItem('gomini_uName', name);
        localStorage.setItem('gomini_uPhone', phone);
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('displayUserName').innerText = name;
        
        let msg = `नमस्ते ${name} जी! पटेल ट्रेडर्स के सपोर्ट पोर्टल पर आपका स्वागत है।`;
        addMsg(msg, 'ai');
        speakText(msg);
    }

    function checkLocalKnowledge(text) {
        const cleanText = " " + text.toLowerCase().replace(/[.,!?]/g, '') + " "; 
        for (let item of LOCAL_KNOWLEDGE) {
            for (let keyword of item.keywords) {
                if (cleanText.includes(" " + keyword + " ")) {
                    return item.response;
                }
            }
        }
        return null; 
    }

    function optimizeQueryForDatabase(rawText) {
        let cleanText = rawText.toLowerCase().replace(/[?.,!]/g, '');
        const fillers = [
            "please tell me about", "can you tell me", "mujhe batao ki", "i want to know",
            "give me the link to", "do you have", "what kind of", "what type of", "kaun kaun se",
            "give me", "show me", "bhaiya", "please", "kya", "mujhe", "batao", "link to",
            "what is", "where is", "how to", "i need", "chahiye", "dikhao", "ke bare mein", "detail", "details"
        ];
        for(let filler of fillers) {
            cleanText = cleanText.replace(new RegExp(filler, 'gi'), '');
        }
        cleanText = cleanText.trim();
        return cleanText.length > 0 ? cleanText : rawText;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const originalText = input.value.trim();
        if(!originalText) return;

        window.speechSynthesis.cancel(); 

        addMsg(originalText, 'user');
        input.value = "";
        toggleSendBtn();
        showThinking(true, "Gomini AI सोच रहा है...");

        let isAdmin = sessionStorage.getItem('gomini_admin') === 'true';

        if(originalText.toLowerCase().includes("admin955") || originalText.toLowerCase().includes("redmi 955")) {
            activateAdminUI();
            showThinking(false);
            let ans = "संजय भाई, एडमिन मोड सक्रिय है। अब आप 'सवाल | जवाब' लिखकर मुझे सिखा सकते हैं।";
            addMsg("✅ " + ans, 'ai');
            speakText(ans);
            return;
        }

        if(isAdmin && originalText.includes("|")) {
            let parts = originalText.split("|");
            try {
                let learnUrl = `${CONFIG.url}?token=${CONFIG.token}&action=learn&q=${encodeURIComponent(parts[0].trim())}&a=${encodeURIComponent(parts[1].trim())}&key=${CONFIG.master_key}`;
                await fetch(learnUrl, {mode: 'no-cors'});
                showThinking(false);
                let ans = "संजय भाई, यह जानकारी मेरी मेमोरी में सेव हो गई है।";
                addMsg("✅ " + ans, 'ai');
                speakText(ans);
            } catch(e) {
                showThinking(false);
                addMsg("Error: सेव नहीं हो पाया।", 'ai');
            }
            return;
        }

        let localResponse = checkLocalKnowledge(originalText);
        if (localResponse) {
            setTimeout(() => {
                showThinking(false);
                addMsg(localResponse, 'ai');
                speakText(localResponse);
            }, 800); 
            return;
        }

        showThinking(true, "Connecting to Database...");
        let smartQuery = optimizeQueryForDatabase(originalText);

        try {
            let res = await fetch(`${CONFIG.url}?token=${CONFIG.token}&action=askJarvis&q=${encodeURIComponent(smartQuery)}&phone=${userInfo.phone}`);
            let data = await res.json();
            
            showThinking(false);
            
            if(!data.answer || data.answer.trim() === "" || data.answer.includes("नहीं पता") || data.answer.includes("not in my database")) {
                let notFoundMsg = "माफ़ कीजिये, यह जानकारी मेरी मेमोरी में नहीं है। (This is not in my memory)";
                addMsg(notFoundMsg, 'ai');
                speakText(notFoundMsg);
            } else {
                addMsg(data.answer, 'ai');
                speakText(data.answer); 
            }

        } catch(e) {
            showThinking(false);
            let err = "माफ़ कीजिये, सर्वर अभी कनेक्ट नहीं हो पा रहा है।";
            addMsg(err, 'ai');
            speakText(err);
        }
    }

    function addMsg(text, sender) {
        const body = document.getElementById('chatBody');
        const div = document.createElement('div');
        
        if(sender === 'ai') {
            div.className = "message-bubble bg-white p-4 rounded-[28px] rounded-tl-none border border-gray-100 text-gray-800 text-sm font-bold shadow-sm";
            
            const iconSvg = isVoiceEnabled ? 
                `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>` : 
                `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>`;
            const colorClass = isVoiceEnabled ? "text-green-500" : "text-red-500";

            let formattedText = text.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                return `<a href="${url}" target="_blank" class="text-blue-600 underline hover:text-blue-800 break-all">${url}</a>`;
            });

            div.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <span class="text-[10px] text-orange-500 block">PT GOMINI</span>
                    <button onclick="toggleVoiceState()" title="आवाज़ चालू/बंद करें" class="voice-toggle-btn ${colorClass} bg-gray-50 rounded-full w-6 h-6 flex items-center justify-center transition-all">${iconSvg}</button>
                </div>
                ${formattedText}
            `;
        } else {
            div.className = "message-bubble bg-orange-500 p-5 rounded-[28px] rounded-tr-none text-white text-sm font-bold ml-auto shadow-lg";
            div.innerText = text; 
        }
        
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
    }

    function showThinking(show, text = "Gomini AI सोच रहा है...") {
        const ind = document.getElementById('thinkingIndicator');
        const tText = document.getElementById('thinkingText');
        const body = document.getElementById('chatBody');
        if(show) {
            tText.innerText = text;
            ind.classList.remove('hidden');
            body.scrollTop = body.scrollHeight;
        } else {
            ind.classList.add('hidden');
        }
    }
